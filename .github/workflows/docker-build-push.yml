name: Build and push Docker image

# Builds the image and pushes it to Docker Hub whenever a version tag is
# pushed (e.g. `git tag v26.2 && git push origin v26.2`). Can also be run
# manually from the Actions tab, optionally pinning a Minecraft version.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      minecraft_version:
        description: 'Minecraft version to build ("latest" or an explicit id like 26.2)'
        required: false
        default: latest

env:
  IMAGE_NAME: colincoleman/minecraft-docker

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          # metadata-action also tags `latest` for the highest semver tag.

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MINECRAFT_VERSION=${{ github.event.inputs.minecraft_version || 'latest' }}
